<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacle Web</title>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Gluten:wght@100..900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Gluten", cursive;
            font-style: normal;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .container-b {
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 2rem;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .nav-card {
            background: rgb(255, 255, 255);
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 3rem;
            text-decoration: none;
            position: relative;
        }
        
        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
        }

        .animated-text span {
          display: inline-block;
          animation-name: float;
          animation-duration: 3s;
          animation-timing-function: ease-in-out;
          animation-iteration-count: infinite;
          position: relative;
        }

        @keyframes float {
          0%   { transform: translate(0px, 0px); }
          25%  { transform: translate(3px, -3px); }
          50%  { transform: translate(-3px, 3px); }
          75%  { transform: translate(3px, 3px); }
          100% { transform: translate(0px, 0px); }
        }
    
        .animated-text span:nth-child(1) { animation-delay: 0s; }
        .animated-text span:nth-child(2) { animation-delay: 0.1s; }
        .animated-text span:nth-child(3) { animation-delay: 0.2s; }
        .animated-text span:nth-child(4) { animation-delay: 0.3s; }
        .animated-text span:nth-child(5) { animation-delay: 0.4s; }
        .animated-text span:nth-child(6) { animation-delay: 0.5s; }
    
    </style>
</head>
<body>
    <div class="container">
        <h1 class="animated-text"><span>J</span><span>a</span><span>c</span><span>l</span><span>e</span><span>&nbsp;</span><span>W</span><span>e</span><span>b</span></h1>
        <div class="container-b">
          <div class="nav-grid">
              <a href="https://qwrench.github.io/NatureSim/index.html" class="nav-card">
                  <h2>Nature Simulator</h2>
                  <p>A Nature Simulator (WIP)</p>
              </a>
        </div>
        <div class="footer">
            <p>&copy; 2025 - All Rights reserved.</p>
        </div>
    </div>
</body>
</html>
